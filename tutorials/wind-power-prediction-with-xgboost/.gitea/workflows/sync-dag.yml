# .gitea/workflows/sync-dag.yml
#
# DAG 자동 동기화 — wind_power_prediction.py → airflow-dags 저장소
#
# 이 워크플로우가 필요한 이유:
#   Airflow 는 git-sync 를 통해 airflow-dags 저장소를 감시하도록 설정되어 있다.
#   반면 튜토리얼 소스는 wind-power-prediction 이라는 별도 저장소에 있다.
#   두 저장소를 수동으로 동기화하는 대신, DAG 파일이 변경될 때마다 Gitea API 를
#   호출해 airflow-dags 저장소의 해당 경로에 자동 복사한다.
#
# 동작 방식:
#   wind_power_prediction.py 가 main 브랜치에 push 되면
#     → Gitea contents API 로 airflow-dags/wind_power_prediction/wind_power_prediction.py
#       를 create-or-update
#     → Airflow 의 git-sync 가 몇 초 뒤 해당 파일을 가져와 DAG 재파싱
#
# 트리거 경로:
#   - wind_power_prediction.py 만 (dataset/Dockerfile/requirements 변경은 이 워크플로우를 트리거하지 않음)
#   - 이미지 변경 사항은 별도 build-image.yml 이 처리 (두 워크플로우는 독립적)
#
# 사전 준비 (Gitea 저장소 Settings > Secrets and Variables > Actions):
#   GIT_USERNAME : Gitea 로그인 사용자명
#   GIT_TOKEN    : Gitea 접근 토큰 (airflow-dags 저장소 write 권한 필요)
#
# Gitea 호스트와 조직명은 워크플로우 컨텍스트(github.server_url / github.repository_owner)
# 에서 자동 추출하므로 별도 설정 불필요. airflow-dags 저장소 이름이 다르면 아래 DAGS_REPO 수정.

name: Sync DAG to airflow-dags

on:
  push:
    branches:
      - main
    paths:
      - "wind_power_prediction.py"

jobs:
  sync-dag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout wind-power-prediction repository
        uses: actions/checkout@v4

      - name: Ensure jq is available
        # ubuntu-latest 러너에는 기본 포함되어 있지만, 최소형 이미지를 쓰는 경우
        # 또는 다른 배포판(alpine/centos) 러너를 쓰는 경우에 대비한 설치 스텝.
        # non-root 러너는 sudo 로 자동 폴백.
        run: |
          if command -v jq >/dev/null 2>&1; then
            echo "jq 이미 설치됨: $(jq --version)"
            exit 0
          fi
          # sudo 가 존재하고 비밀번호 없이 실행 가능하면 사용, 아니면 맨손으로 시도
          SUDO=""
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            SUDO="sudo"
          fi
          if command -v apt-get >/dev/null 2>&1; then
            $SUDO apt-get update && $SUDO apt-get install -y jq
          elif command -v yum >/dev/null 2>&1; then
            $SUDO yum install -y jq
          elif command -v apk >/dev/null 2>&1; then
            $SUDO apk add --no-cache jq
          else
            echo "❌ jq 를 설치할 패키지 매니저를 찾지 못했습니다"
            exit 1
          fi

      - name: Sync DAG via Gitea API
        env:
          API_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          DEST_PATH="wind_power_prediction/wind_power_prediction.py"
          # Gitea 호스트는 현재 저장소가 호스팅된 곳 (github.server_url),
          # 조직명은 현재 저장소 owner 와 동일한 조직 (airflow-dags 도 같은 조직 전제).
          DAGS_REPO="airflow-dags"
          API_BASE="${{ github.server_url }}/api/v1/repos/${{ github.repository_owner }}/${DAGS_REPO}"
          BRANCH="main"

          # DAG 파일을 base64로 인코딩 (-w 0: 개행 없이 한 줄로)
          CONTENT=$(base64 -w 0 wind_power_prediction.py 2>/dev/null || base64 wind_power_prediction.py | tr -d '\n')

          # 기존 파일 SHA 조회 (업데이트 시 필요)
          FILE_SHA=$(curl -s \
            -H "Authorization: token ${API_TOKEN}" \
            "${API_BASE}/contents/${DEST_PATH}?ref=${BRANCH}" \
            | jq -r '.sha // empty')

          COMMIT_MSG="chore: sync wind_power_prediction DAG (from ${{ github.repository }}@${{ github.sha }})"

          if [ -z "${FILE_SHA}" ]; then
            echo "신규 파일 생성..."
            PAYLOAD=$(jq -n \
              --arg msg "${COMMIT_MSG}" \
              --arg content "${CONTENT}" \
              --arg branch "${BRANCH}" \
              '{"message":$msg,"content":$content,"branch":$branch}')
            HTTP_CODE=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: token ${API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${PAYLOAD}" \
              "${API_BASE}/contents/${DEST_PATH}")
          else
            echo "기존 파일 업데이트 (SHA: ${FILE_SHA})..."
            PAYLOAD=$(jq -n \
              --arg msg "${COMMIT_MSG}" \
              --arg content "${CONTENT}" \
              --arg branch "${BRANCH}" \
              --arg sha "${FILE_SHA}" \
              '{"message":$msg,"content":$content,"branch":$branch,"sha":$sha}')
            HTTP_CODE=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
              -X PUT \
              -H "Authorization: token ${API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${PAYLOAD}" \
              "${API_BASE}/contents/${DEST_PATH}")
          fi

          echo "API 응답 코드: ${HTTP_CODE}"
          if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "201" ]; then
            echo "❌ API 호출 실패"
            cat /tmp/api_response.json
            exit 1
          fi
          echo "✅ DAG 동기화 완료"
          echo "   SOURCE : wind_power_prediction.py"
          echo "   DEST   : ${DEST_PATH}"
          echo "   HTTP   : ${HTTP_CODE}"
