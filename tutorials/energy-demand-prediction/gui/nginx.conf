server {
    listen 80;
    server_name _;

    # SPA 정적 파일
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # 추론 API 프록시 — /api/inference/* → inference.<your-runway-domain>/api/*
    location /api/inference/ {
        proxy_pass https://inference.<your-runway-domain>/api/;
        proxy_set_header Host inference.<your-runway-domain>;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Airflow API 프록시 — /api/airflow/* → airflow.<your-runway-domain>/*
    location /api/airflow/ {
        proxy_pass https://airflow.<your-runway-domain>/;
        proxy_set_header Host airflow.<your-runway-domain>;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}
