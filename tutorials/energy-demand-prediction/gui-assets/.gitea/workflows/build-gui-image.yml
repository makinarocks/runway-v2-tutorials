# .gitea/workflows/build-gui-image.yml
#
# GUI nginx 이미지 자동 빌드 & Gitea Container Registry 푸시
#
# 사전 준비 (Gitea 저장소 Settings > Secrets and Variables > Actions):
#   GIT_USERNAME  : Gitea 로그인 사용자명
#   GIT_TOKEN     : Gitea 접근 토큰 (packages write 권한 필요)
#   GUI_IMAGE_TAG : GUI 이미지 full URL
#                   예) gitea.<domain>/<project-id>/energy-demand-gui:latest

name: Build GUI Image

on:
  push:
    branches:
      - main
    paths:
      - "gui/**"
      - "Dockerfile.gui"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract registry host from GUI_IMAGE_TAG
        id: registry
        run: echo "host=$(echo '${{ secrets.GUI_IMAGE_TAG }}' | cut -d/ -f1)" >> "$GITHUB_OUTPUT"

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.host }}
          username: ${{ secrets.GIT_USERNAME }}
          password: ${{ secrets.GIT_TOKEN }}

      - name: Build and push GUI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.gui
          push: true
          tags: ${{ secrets.GUI_IMAGE_TAG }}

      - name: Image build summary
        run: |
          echo "✅ GUI 이미지 빌드 & 푸시 완료"
          echo "   IMAGE : ${{ secrets.GUI_IMAGE_TAG }}"
          echo "   COMMIT: ${{ github.sha }}"
