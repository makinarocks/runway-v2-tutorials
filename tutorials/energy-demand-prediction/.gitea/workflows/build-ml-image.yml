# .gitea/workflows/build-ml-image.yml
#
# ML task_runner 이미지 자동 빌드 & Gitea Container Registry 푸시
#
# 사전 준비 (Gitea 저장소 Settings > Secrets and Variables > Actions):
#   GIT_USERNAME : Gitea 로그인 사용자명
#   GIT_TOKEN    : Gitea 접근 토큰 (packages write 권한 필요)
#   IMAGE_TAG    : ML 이미지 full URL
#                  예) gitea.<domain>/<project-id>/energy-demand-prediction:latest

name: Build ML Image

on:
  push:
    branches:
      - main
    paths:
      - "task_runner.py"
      - "config.py"
      - "Dockerfile"
      - "requirements.txt"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract registry host from IMAGE_TAG
        id: registry
        run: echo "host=$(echo '${{ secrets.IMAGE_TAG }}' | cut -d/ -f1)" >> "$GITHUB_OUTPUT"

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.host }}
          username: ${{ secrets.GIT_USERNAME }}
          password: ${{ secrets.GIT_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.IMAGE_TAG }}

      - name: Image build summary
        run: |
          echo "✅ ML 이미지 빌드 & 푸시 완료"
          echo "   IMAGE : ${{ secrets.IMAGE_TAG }}"
          echo "   COMMIT: ${{ github.sha }}"
