# .gitea/workflows/build-image.yml
#
# [Option B] Gitea Actions CI/CD — Gitea CR 이미지 자동 빌드 & 푸시
#
# 동작 방식:
#   아래 파일 중 하나라도 변경되어 main 브랜치에 push되면 자동으로 이미지를 빌드하여
#   Gitea Container Registry(gitea.v2.mrxrunway.ai)에 푸시한다.
#
# 트리거 대상 파일:
#   - task_runner.py      (태스크 로직 변경)
#   - Dockerfile          (베이스 이미지 또는 빌드 설정 변경)
#   - requirements.txt    (패키지 추가/변경)
#   - dataset/**          (학습 데이터 변경)
#
# 사전 준비 (Gitea 저장소 Settings > Secrets and Variables > Actions):
#   CR_USERNAME : Gitea 로그인 사용자명
#   CR_PASSWORD : Gitea 접근 토큰 (패키지 write 권한 포함)
#   IMAGE_TAG   : 빌드할 이미지 full URL
#                 예) gitea.v2.mrxrunway.ai/<org>/wind-power:latest

name: Build and Push to Gitea CR

on:
  push:
    branches:
      - main
    paths:
      - "task_runner.py"
      - "Dockerfile"
      - "requirements.txt"
      - "dataset/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # Gitea Actions runner 레이블. 환경에 맞게 수정

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: gitea.v2.mrxrunway.ai
          username: ${{ secrets.CR_USERNAME }}
          password: ${{ secrets.CR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ secrets.IMAGE_TAG }}-cache
          cache-to: type=registry,ref=${{ secrets.IMAGE_TAG }}-cache,mode=max

      - name: Image build summary
        run: |
          echo "✅ Gitea CR 이미지 빌드 & 푸시 완료"
          echo "   IMAGE : ${{ secrets.IMAGE_TAG }}"
          echo "   COMMIT: ${{ github.sha }}"
          echo "   BRANCH: ${{ github.ref_name }}"
