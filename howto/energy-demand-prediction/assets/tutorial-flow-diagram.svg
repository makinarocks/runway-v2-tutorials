<svg viewBox="0 0 680 740" width="680" height="740" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif">
  <defs>
    <marker id="t-arr-slate"  markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#64748b"/></marker>
    <marker id="t-arr-blue"   markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#2563eb"/></marker>
    <marker id="t-arr-green"  markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#059669"/></marker>
    <marker id="t-arr-orange" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L9,3.5 z" fill="#d97706"/></marker>
  </defs>

  <!-- Canvas -->
  <rect width="680" height="740" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Legend (상단) -->
  <rect x="40" y="20"  width="600" height="30" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="56"  y="30" width="14" height="12" rx="2" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
  <text x="76"  y="41" font-size="11" fill="#64748b">사전 준비 (0단계)</text>
  <rect x="200" y="30" width="14" height="12" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="220" y="41" font-size="11" fill="#2563eb">환경 구성 (1~2단계)</text>
  <rect x="354" y="30" width="14" height="12" rx="2" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="374" y="41" font-size="11" fill="#059669">학습·추론 (3~4단계)</text>
  <rect x="508" y="30" width="14" height="12" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="528" y="41" font-size="11" fill="#d97706">앱·재학습 (5~6단계)</text>

  <!-- ── Phase A: 사전 준비 (Slate) ── -->

  <!-- 0단계 (y=66) -->
  <rect x="40" y="66"  width="600" height="70" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <rect x="40" y="66"  width="600" height="26" rx="8" fill="#e2e8f0"/>
  <rect x="40" y="80"  width="600" height="12" fill="#e2e8f0"/>
  <text x="340" y="84"  text-anchor="middle" font-size="15" fill="#1e293b" font-weight="700">0단계. 사전 준비</text>
  <text x="340" y="115" text-anchor="middle" font-size="13" fill="#475569">API 키 · S3 키 · Gitea PAT 발급 및 OpenBao 시크릿 등록</text>

  <!-- Arrow 0→1 (blue: entering blue phase) -->
  <line x1="340" y1="138" x2="340" y2="160" stroke="#2563eb" stroke-width="1.5" marker-end="url(#t-arr-blue)"/>

  <!-- ── Phase B: 환경 구성 (Blue) ── -->

  <!-- 1단계 (y=162) -->
  <rect x="40" y="162" width="600" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="40" y="162" width="600" height="26" rx="8" fill="#dbeafe"/>
  <rect x="40" y="176" width="600" height="12" fill="#dbeafe"/>
  <text x="340" y="180" text-anchor="middle" font-size="15" fill="#1e40af" font-weight="700">1단계. 개발 환경 설정</text>
  <text x="340" y="211" text-anchor="middle" font-size="13" fill="#1e40af">PVC 생성 · Code Server &amp; Airflow 카탈로그 앱 배포</text>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="234" x2="340" y2="256" stroke="#2563eb" stroke-width="1.5" marker-end="url(#t-arr-blue)"/>

  <!-- 2단계 (y=258) -->
  <rect x="40" y="258" width="600" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="40" y="258" width="600" height="26" rx="8" fill="#dbeafe"/>
  <rect x="40" y="272" width="600" height="12" fill="#dbeafe"/>
  <text x="340" y="276" text-anchor="middle" font-size="15" fill="#1e40af" font-weight="700">2단계. 코드·데이터 준비</text>
  <text x="340" y="307" text-anchor="middle" font-size="13" fill="#1e40af">Gitea 저장소 연결 · 학습 코드 &amp; 분기별 CSV 업로드</text>

  <!-- Arrow 2→3 (green: entering green phase) -->
  <line x1="340" y1="330" x2="340" y2="352" stroke="#059669" stroke-width="1.5" marker-end="url(#t-arr-green)"/>

  <!-- ── Phase C: 학습·추론 (Green) ── -->

  <!-- 3단계 (y=354) -->
  <rect x="40" y="354" width="600" height="70" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
  <rect x="40" y="354" width="600" height="26" rx="8" fill="#dcfce7"/>
  <rect x="40" y="368" width="600" height="12" fill="#dcfce7"/>
  <text x="340" y="372" text-anchor="middle" font-size="15" fill="#065f46" font-weight="700">3단계. 모델 학습</text>
  <text x="340" y="403" text-anchor="middle" font-size="13" fill="#065f46">Airflow DAG 실행 → KubernetesPodOperator로 학습 Pod 기동</text>

  <!-- Arrow 3→4 -->
  <line x1="340" y1="426" x2="340" y2="448" stroke="#059669" stroke-width="1.5" marker-end="url(#t-arr-green)"/>

  <!-- 4단계 (y=450) -->
  <rect x="40" y="450" width="600" height="70" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
  <rect x="40" y="450" width="600" height="26" rx="8" fill="#dcfce7"/>
  <rect x="40" y="464" width="600" height="12" fill="#dcfce7"/>
  <text x="340" y="468" text-anchor="middle" font-size="15" fill="#065f46" font-weight="700">4단계. 추론 엔드포인트 배포</text>
  <text x="340" y="499" text-anchor="middle" font-size="13" fill="#065f46">MLflow Model Registry → Runway 추론 엔드포인트 생성</text>

  <!-- Arrow 4→5 (orange: entering orange phase) -->
  <line x1="340" y1="522" x2="340" y2="544" stroke="#d97706" stroke-width="1.5" marker-end="url(#t-arr-orange)"/>

  <!-- ── Phase D: 앱·재학습 (Orange) ── -->

  <!-- 5단계 (y=546) -->
  <rect x="40" y="546" width="600" height="70" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <rect x="40" y="546" width="600" height="26" rx="8" fill="#fef3c7"/>
  <rect x="40" y="560" width="600" height="12" fill="#fef3c7"/>
  <text x="340" y="564" text-anchor="middle" font-size="15" fill="#92400e" font-weight="700">5단계. 웹 대시보드 배포·테스트</text>
  <text x="340" y="595" text-anchor="middle" font-size="13" fill="#92400e">Helm 차트로 React+nginx 커스텀 앱 배포</text>

  <!-- Arrow 5→6 -->
  <line x1="340" y1="618" x2="340" y2="640" stroke="#d97706" stroke-width="1.5" marker-end="url(#t-arr-orange)"/>

  <!-- 6단계 (y=642) -->
  <rect x="40" y="642" width="600" height="70" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <rect x="40" y="642" width="600" height="26" rx="8" fill="#fef3c7"/>
  <rect x="40" y="656" width="600" height="12" fill="#fef3c7"/>
  <text x="340" y="660" text-anchor="middle" font-size="15" fill="#92400e" font-weight="700">6단계. 재학습·트래픽 전환</text>
  <text x="340" y="691" text-anchor="middle" font-size="13" fill="#92400e">학습 데이터 추가 → v2 모델 학습 → 추론 엔드포인트 추가</text>
</svg>
